name: Release Assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            artifact_name: mtproto-proxy-linux-x86_64
          - target: aarch64-linux
            artifact_name: mtproto-proxy-linux-aarch64

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build release binary
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}

      - name: Package artifact
        run: |
          mkdir -p dist
          cp zig-out/bin/mtproto-proxy dist/${{ matrix.artifact_name }}
          chmod +x dist/${{ matrix.artifact_name }}
          tar -C dist -czf dist/${{ matrix.artifact_name }}.tar.gz ${{ matrix.artifact_name }}

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/${{ matrix.artifact_name }}.tar.gz --clobber
